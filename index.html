<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灰烬中的城镇</title>
    <base href="/">
    <script>
        (function () {
            const params = new URLSearchParams(window.location.search || '');
            const queryVariant = String(params.get('variant') || '').toLowerCase();
            const path = String(window.location.pathname || '/').toLowerCase();
            let variant = 'p1';
            if (queryVariant === 'p2' || path === '/p2' || path.startsWith('/p2/')) {
                variant = 'p2';
            } else if (queryVariant === 'p1' || path === '/p1' || path.startsWith('/p1/')) {
                variant = 'p1';
            } else {
                try {
                    const stored = String(sessionStorage.getItem('newsgame-study-variant') || '').toLowerCase();
                    if (stored === 'p2' || stored === 'p1') variant = stored;
                } catch {}
            }
            window.__NEWSGAME_STUDY_VARIANT__ = variant;
            document.documentElement.dataset.studyVariant = variant;
            try {
                sessionStorage.setItem('newsgame-study-variant', variant);
            } catch {}
        })();
    </script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="game-wrapper">
        <aside id="flowchart-container" class="flowchart-container"></aside>
        <div class="container">
            <div id="intro-modal" class="intro-modal">
                <div class="intro-card">
                    <h2 class="intro-title">开场任务</h2>
                    <div class="intro-text">
                        <p>你将阅读一篇关于近期加州野火事件的新闻报道。请仔细阅读内容，并根据你的理解和感受回答后续问题。</p>
                        <p>请注意：</p>
                        <ul>
                            <li>“阅读过程中尽量保持专注。”</li>
                            <li>“你无需记住所有细节，但请尽量理解新闻的主要内容和信息。”</li>
                        </ul>
                        <p>阅读时间预计 2-3 分钟。请开始阅读新闻。</p>
                    </div>
                    <div id="intro-step-name" class="intro-step is-active">
                        <label class="intro-label" for="experiment-code-input">实验编号</label>
                        <input id="experiment-code-input" class="intro-input" type="text" inputmode="numeric" maxlength="1" autocomplete="off" placeholder="请输入实验编号" />
                        <label class="intro-label" for="player-name-input">你的名字</label>
                        <input id="player-name-input" class="intro-input" type="text" placeholder="请输入姓名" />
                        <div class="intro-actions">
                            <button id="intro-start-btn" class="btn btn-primary">开始报道</button>
                        </div>
                    </div>
                </div>
            </div>
            <header id="header">
                <div class="header-top">
                    <h1 class="game-title">灰烬中的城镇</h1>
                    <div class="header-actions">
                        <div class="live-score">
                            <span id="live-score-label" class="live-score-label">新闻价值</span>
                            <span id="live-score-value" class="live-score-value">60 / 100</span>
                        </div>
                        <label for="language-select" class="lang-label">语言</label>
                        <select id="language-select" class="lang-select">
                            <option value="zh">中文</option>
                            <option value="en">English</option>
                        </select>
                    </div>
                </div>
                <div id="progress-bar" class="progress-bar" style="display: none;">
                    <div class="progress-fill"></div>
                </div>
            </header>
            <section id="stats-panel" class="stats-panel">
                <div class="stats-title">采访记录</div>
                <div class="stats-row">
                    <span id="stats-label-reporter" class="stats-label">记者</span>
                    <span id="stats-name" class="stats-value">-</span>
                </div>
                <div class="stats-row">
                    <span id="stats-label-score" class="stats-label">新闻价值</span>
                    <span id="stats-score" class="stats-value">0 / 100</span>
                </div>
                <div class="stats-row">
                    <span id="stats-label-clicks" class="stats-label">鼠标点击</span>
                    <span id="stats-clicks" class="stats-value">0</span>
                </div>
                <div class="stats-row">
                    <span id="stats-label-distance" class="stats-label">移动距离</span>
                    <span id="stats-distance" class="stats-value">0 px</span>
                </div>
                <div class="stats-row">
                    <span id="stats-label-ai" class="stats-label">AI 互动次数</span>
                    <span id="stats-ai" class="stats-value">0</span>
                </div>
                <div id="stats-label-choices" class="stats-subtitle">选择记录</div>
                <ol id="stats-choices" class="stats-list"></ol>
            </section>

            <!-- Main Content Area -->
            <main id="app">
                <div class="loading">加载中...</div>
            </main>
        </div>
        <aside class="news-board">
            <div class="news-board-header">
                <div class="news-board-header-left">
                    <div class="news-board-title">实时看板</div>
                    <div class="news-board-sub">加州野火 · 更新</div>
                </div>
                <div id="game-time" class="game-time">08:30</div>
            </div>
            <div class="news-board-list">
                <!-- 新闻将通过 JavaScript 动态加载 -->
            </div>
        </aside>
    </div>

    <div id="reading-modal" class="reading-modal" style="display:none;">
        <div class="reading-card">
            <h2 class="reading-title" id="reading-title"></h2>
            <div class="reading-body" id="reading-body"></div>
            <div class="reading-actions">
                <button id="reading-done-btn" class="btn btn-primary">我已完成阅读，继续</button>
            </div>
        </div>
    </div>

    <script src="js/vendor/html2canvas.min.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
